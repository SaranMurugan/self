name: Deploy Project

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd final-project
            sudo git pull
            sudo docker build -t final-app .
            sudo docker stop app || true
            sudo docker rm app || true
            sudo docker run -d -p 8080:80 --name app final-app

